openapi: 3.1.0
info:
  title: Aio Runs API
  version: 1.0.0
  description: >
    Tenant-scoped read and stop endpoints for durable Aio runs. These routes are
    authenticated through the Aio web session and never expose cross-tenant data.
servers:
  - url: http://localhost:3000
paths:
  /api/runs:
    get:
      summary: List runs
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: conversationId
          schema:
            type: string
          description: >
            Optional conversation/thread id filter. Returns runs for one Aio
            conversation only, newest first.
      responses:
        "200":
          description: Tenant-scoped run list
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Run"
                  nextCursor:
                    type:
                      - string
                      - "null"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/runs/{runId}:
    get:
      summary: Get run detail
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  run:
                    $ref: "#/components/schemas/Run"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/runs/{runId}/events:
    get:
      summary: Replay run events
      parameters:
        - $ref: "#/components/parameters/RunId"
        - in: query
          name: afterSequence
          schema:
            type: integer
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1000
      responses:
        "200":
          description: Ordered event stream
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/RunEvent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/runs/{runId}/stop:
    post:
      summary: Request run stop
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Durable cancellation recorded; Hermes stop forwarded when possible
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  noop:
                    type: boolean
                  run:
                    $ref: "#/components/schemas/Run"
                  hermesForwarded:
                    type: boolean
                  hermesStatus:
                    type: string
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  parameters:
    RunId:
      in: path
      name: runId
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Auth required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Run not found for this tenant
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Run:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        conversationId:
          type:
            - string
            - "null"
        threadId:
          type: string
        status:
          type: string
        mode:
          type: string
        inputSummary:
          type:
            - string
            - "null"
        hermesRunId:
          type:
            - string
            - "null"
        hermesSessionId:
          type:
            - string
            - "null"
        reservedCredits:
          type:
            - number
            - "null"
        actualCredits:
          type:
            - number
            - "null"
        errorCode:
          type:
            - string
            - "null"
        errorMessageRedacted:
          type:
            - string
            - "null"
        createdAt:
          type: string
          format: date-time
        startedAt:
          type:
            - string
            - "null"
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type:
            - string
            - "null"
          format: date-time
        cancelRequestedAt:
          type:
            - string
            - "null"
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    RunEvent:
      type: object
      properties:
        id:
          type: string
        schemaVersion:
          type: integer
        runId:
          type: string
        customerId:
          type: string
        sequence:
          type: integer
        type:
          type: string
        occurredAt:
          type: string
          format: date-time
        receivedAt:
          type: string
          format: date-time
        source:
          type: string
        payload:
          type: object
          additionalProperties: true
        hermes:
          type:
            - object
            - "null"
          additionalProperties: true
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        message:
          type: string
