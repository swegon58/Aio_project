model:
  provider: lmstudio
  base_url: http://127.0.0.1:1234/v1
  default: qwen/qwen3.5-9b

memory:
  provider: honcho

image_gen:
  provider: kie
  model: gpt-image-2-text-to-image

# api_server's default toolset (hermes-api-server) excludes "clarify" since
# it's normally an interactive-UI-only tool — Aio's Plan mode needs it for
# the ask-user plan-confirmation step (route.ts PLAN_MODE_INSTRUCTIONS), so
# add it explicitly alongside the platform's normal toolset.
platform_toolsets:
  api_server:
    - hermes-api-server
    - clarify
