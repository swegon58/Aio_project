name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AIO_DEPLOYMENT_ENV: development
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
  SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
  HERMES_DEV_API_SERVER_KEY: test-hermes-key

jobs:
  quality:
    name: Web quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      # Proves the production required-secrets set (production-guard.mjs) stays
      # satisfiable: a production-shaped env with obviously-fake, NON-SECRET
      # placeholders must pass. The fail-closed path (missing/forbidden var) is
      # covered by production-guard.test.ts. Step env overrides the job-wide
      # AIO_DEPLOYMENT_ENV=development and blanks the dev-only HERMES key.
      - name: Production env guard
        env:
          AIO_DEPLOYMENT_ENV: production
          HERMES_DEV_API_SERVER_KEY: ""
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          PADDLE_API_KEY: ci-placeholder-paddle-api-key
          PADDLE_WEBHOOK_SECRET: ci-placeholder-paddle-webhook-secret
          PADDLE_PRICE_ID_STARTER: ci-placeholder-price-starter
          PADDLE_PRICE_ID_PRO: ci-placeholder-price-pro
          PADDLE_PRICE_ID_BUSINESS: ci-placeholder-price-business
          PADDLE_PRICE_ID_TOPUP: ci-placeholder-price-topup
        run: node scripts/check-production-env.mjs

  security:
    name: Security checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install production dependencies
        working-directory: apps/web
        run: npm ci --omit=dev

      - name: Audit production dependencies
        working-directory: apps/web
        run: npm audit --omit=dev --audit-level=high

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  database:
    name: Migration verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Apply migrations to a clean database
        run: supabase db start

      - name: Lint database schema
        run: supabase db lint --local --level warning --fail-on warning

      - name: Stop local database
        if: always()
        run: supabase stop --no-backup

  e2e:
    name: Critical browser flows
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: npm run test:e2e
